<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django on Render</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f4f8;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 480px;
        }
        h1 { color: #1a202c; margin: 0 0 12px; }
        p { color: #718096; margin: 0; }
        .badge {
            display: inline-block;
            background: #46E3B7;
            color: #1a202c;
            font-weight: 600;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 99px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">Live on Render</div>
        <h1>Hello from Django!</h1>
        <p>Your Django app is up and running. Edit <code>myapp/views.py</code> to get started.</p>
    </div>
</body>
</html>
